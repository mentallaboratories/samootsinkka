<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Уроку — SkoolTimez</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0d1117;
            --paper: #f5f2eb;
            --gold: #c9a84c;
            --gold-lt: #e8d5a0;
            --radius: 14px;
        }
        body {
            font-family: 'Geologica', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            padding: 40px 20px;
            margin: 0;
        }
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 6px solid var(--gold);
        }
        h1 { font-family: 'Unbounded', sans-serif; font-size: 1.5rem; margin-bottom: 25px; }
        h2 { font-family: 'Unbounded', sans-serif; font-size: 1rem; color: var(--gold); margin-top: 30px; border-bottom: 1px solid var(--paper); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; color: #666; }
        input, textarea {
            padding: 12px;
            border: 2px solid var(--paper);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--gold); }
        .full { grid-column: span 2; }
        button {
            background: var(--ink);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); background: #1a1f26; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Створення lesson.json</h1>
        <form id="lessonCreator">
            <div class="grid">
                <div class="field">
                    <label>Номер уроку</label>
                    <input type="text" id="num" placeholder="Урок № 12">
                </div>
                <div class="field">
                    <label>Дата</label>
                    <input type="text" id="date" placeholder="14 травня">
                </div>
                <div class="field full">
                    <label>Назва уроку</label>
                    <input type="text" id="title" placeholder="Hi, I am Tom!">
                </div>
                <div class="field full">
                    <label>Опис теми</label>
                    <textarea id="topic" rows="2"></textarea>
                </div>
                <div class="field full">
                    <label>Мета уроку</label>
                    <textarea id="aim" rows="2"></textarea>
                </div>
                <div class="field full">
                    <label>Словник (JSON формат)</label>
                    <textarea id="vocab" rows="4" placeholder='[{"term": "word", "def": "переклад"}]'></textarea>
                </div>
            </div>
            <button type="button" onclick="generateJSON()">Завантажити JSON файл</button>
        </form>
    </div>

    <script>
        function generateJSON() {
            const data = {
                metadata: {
                    number: document.getElementById('num').value,
                    date: document.getElementById('date').value,
                    title: document.getElementById('title').value,
                    topic: document.getElementById('topic').value,
                    aim: document.getElementById('aim').value
                },
                vocabulary: JSON.parse(document.getElementById('vocab').value || "[]")
            };
            
            const blob = new Blob([JSON.stringify(data, null, 4)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'lesson.json';
            a.click();
        }
    </script>
</body>
</html>
